<!doctype html>
<html lang="en" data-bs-theme="light">
    <head>
        <title>To-Do List</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- Bootstrap CSS v5.3.8 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Margarine&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="styles.css" />
    </head>

    <body class="d-flex flex-column min-vh-100">
        <header>
            <!-- place navbar here -->
        </header>
        <main class="container mt-5 flex-grow-1">

            <div class="row justify-content-center">
    
                <div class="col-md-8 col-lg-6">
                    <h2 class="text-center">♡ <u>To-Do List</u> ♡</h2>
                    <div class="row">
                        <div class="col-8">
                            <input type="text" id="taskInput" class="form-control" placeholder="Enter your task! ♡">
                        </div>
                        <div class="col-4">
                            <button id="addTaskBtn" class="btn w-100">Add Task!</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-12">
                    <ul id="taskList" class="list-group mt-3"></ul>
                </div>
            </div>
            <div class="row">
                <div class="col-12">
                    <button id="clearTaskBtn" class="btn w-100">Clear All Tasks!</button>
                </div>
            </div>
        </main>
        <footer class="text-center mt-auto" style="position: fixed; bottom: 0; width: 100%;">
            <div class="footer-wrapper">
                <img src="sunny.png" alt="Sun" class="footer-img" height="100" width="100">
                <h2 class="footer-text">Belly Cubley 2026 WDPP</h2>
            </div>
        </footer>
        <!-- Bootstrap JavaScript Bundle (includes Popper) -->
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
        <script src="script.js"></script>
    </body>
</html>
